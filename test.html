<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Afterlife Ecosystem</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Nebula background -->
    <div class="nebula"></div>

    <!-- Cosmic glow effect -->
    <div class="cosmic-glow"></div>

    <!-- Animated stars -->
    <div class="stars-container" id="stars-container"></div>

    <div class="container">
        <nav class="navbar">
            <div class="logo">
                <div class="logo-triangle">A</div>
                <span>AFTERLIFE</span>
            </div>
            <div class="nav-links">
                <a href="#home">HOME</a>
                <a href="#solutions">SOLUTIONS</a>
                <a href="#partnerships">PARTNERSHIPS</a>
                <a href="#about">ABOUT US</a>
                <a href="#contact">CONTACT</a>
            </div>
        </nav>

        <div class="hero-section">
            <div class="ecosystem-container">
                <svg id="ecosystem-svg" class="ecosystem-svg">
                    <!-- SVG content will be generated by JavaScript -->
                </svg>
            </div>
            <div class="scroll-indicator">
                <span>SCROLL TO EXPLORE</span>
                <div class="scroll-arrow">↓</div>
            </div>
        </div>
    </div>

    <script src="ecosystem-data.js"></script>

    <script src="stars.js"></script>

</html>
